<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Greater Engine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid"></div>

  <header class="site-header">
    <nav class="navbar" id="navbar">
      <div class="logo"><a href="index.html">THE GREATER ENGINE</a></div>
      <ul class="nav-links">
        <li><a href="archive.html">Archive</a></li>
      </ul>
    </nav>
  </header>

  <main class="home-main">
    <section class="home-hero">
      <p class="eyebrow">PERSONAL WRITING PROJECT</p>
      <h1>The Greater Engine</h1>
      <p class="byline">Joshua Waldo</p>
      <p class="hero-text">
        A personal writing and research project about discipline, growth,
        memory, pressure, and becoming.
      </p>

      <div class="home-actions">
        <a href="archive.html" class="primary-link">Enter Archive</a>
      </div>
    </section>
  </main>

  <footer class="footer minimal-footer">
    <p>© 2026 The Greater Engine</p>
  </footer>

  <div class="music-bar">
    <div class="music-bar-title" id="musicTitle">Now playing: Quiet Work Theme</div>

    <div class="music-bar-controls">
      <button id="prevTrack" class="music-bar-btn" aria-label="Previous">◀</button>
      <button id="musicToggle" class="music-bar-btn" aria-label="Play or pause">▶</button>
      <button id="nextTrack" class="music-bar-btn" aria-label="Next">▶|</button>
    </div>

    <div class="music-bar-volume">
      <span class="music-vol-label">VOL</span>
      <input id="volumeSlider" class="music-bar-slider" type="range" min="0" max="1" step="0.01" value="0.45" />
    </div>

    <audio id="bgMusic"></audio>
  </div>

  <script src="script.js"></script>
</body>
</html>
